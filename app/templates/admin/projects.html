{% extends 'base.html' %} {% block title %}Admin | Projects{% endblock %} {%
block body %}
<div class="main-content">
  <div class="admin-header">
    <h1>Projects</h1>
    <a href="{{ url_for('admin.index') }}">← Back to Dashboard</a>
  </div>

  <section class="project-list">
    {% for project in projects %}
    <div class="project-row">
      <form
        method="POST"
        action="{{ url_for('admin.delete_project', slug=project.slug) }}"
      >
        <button type="submit" class="btn-delete">✕</button>
      </form>
      <span>{{ project.title }}</span>
      <span>{{ project.year }}</span>
      <div class="project-actions">
        <a href="{{ url_for('admin.edit_project', slug=project.slug) }}"
          >Edit</a
        >
      </div>
    </div>
    {% endfor %}
  </section>

  <section class="project-form">
    <h2>Add Project</h2>
    <form method="POST" action="{{ url_for('admin.add_project') }}">
      <input type="text" name="title" placeholder="Title" required />
      <input type="text" name="slug" placeholder="Slug" required />
      <textarea
        name="description"
        placeholder="Description"
        required
      ></textarea>
      <input type="text" name="link" placeholder="Link" required />
      <input type="number" name="year" placeholder="Year" required />
      <input
        type="text"
        name="picture_url"
        placeholder="Picture URL (optional)"
      />
      <input type="text" name="tags" placeholder="Tags (comma separated)" />
      <button type="submit">Add Project</button>
    </form>
  </section>
</div>
{% endblock %}
