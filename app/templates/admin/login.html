{% extends 'base.html' %}

<!-- blocker -->
{% block title %} Stephan Mundt | Login {% endblock%}

<!-- blocker -->
{% block body %}
<div class="main-content">
  <div class="contact-form">
    <h1>Admin Login</h1>
    <form action="#" method="post">
      <div class="form-subpoint">
        <label for="uname"></label>
        <input
          type="text"
          placeholder="Username"
          name="username"
          id="username"
          required
        />
      </div>
      <div class="form-subpoint">
        <label for="psw"><b></b></label>
        <input
          type="password"
          placeholder="Enter Password"
          name="password"
          required
        />
      </div>

      {% if error %}
      <div id="loginError">{{ error }}</div>

      {% endif %}

      <div class="form-submit">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
