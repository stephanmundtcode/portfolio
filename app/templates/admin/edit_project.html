{% extends 'base.html' %}

<!-- blocker -->
{% block title %}Admin | Edit Project{% endblock %}

<!-- blocker -->
{% block body %}
<div class="main-content">
  <div class="admin-header">
    <h1>Edit Project</h1>
    <a href="{{ url_for('admin.projects') }}">← Back to Projects</a>
  </div>

  <form
    method="POST"
    action="{{ url_for('admin.update_project', slug=project.slug) }}"
  >
    <input type="text" name="title" value="{{ project.title }}" />
    <input type="text" name="slug" value="{{ project.slug }}" />
    <textarea name="description">{{ project.description }}</textarea>
    <input type="text" name="link" value="{{ project.link }}" />
    <input type="number" name="year" value="{{ project.year }}" />
    <input
      type="text"
      name="picture_url"
      value="{{ project.picture_url or '' }}"
    />
    <input
      type="text"
      name="tags"
      value="{{ project.tags | map(attribute='tag') | join(', ') }}"
    />
    <button type="submit">Save Changes</button>
  </form>
</div>
{% endblock %}
