{% extends 'base.html' %}

<!--blocker-->
{% block title %} Stephan Mundt | Projects {% endblock%}

<!--blocker-->
{% block body %}
<div class="main-content">
  <h1>My Projects</h1>
  <div class="projects">
    <ul>
      {% for project in projects %}
      <li>
        <div class="project-cards">
          <a href="/projects/{{project.slug}}">
            <h3>{{ project.title }}</h3>
            <p>{{project.description}}</p>
            <span class="tags">
              {{ project.tags|join(' | ', attribute='tag') }}
            </span>
            <div class="link-div">
              <a class="link" href="{{ project.link }}">GitHub</a>
            </div>
          </a>
        </div>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
