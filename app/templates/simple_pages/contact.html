{% extends 'base.html' %}
<!--blocker-->

{% block title %} Stephan Mundt | Contact {% endblock %}
<!--blocker-->

{% block scripts %}
<script
  defer
  src="{{ url_for('static', filename='js/form-submit.js') }}"
></script>
{% endblock %}
<!--blocker-->

{% block body %}
<div class="main-content">
  <div class="contact-form">
    <h1>Lets get in Contact!</h1>
    <form action="#" method="post">
      <div class="form-subpoint">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" required />
      </div>

      <div class="form-subpoint">
        <label for="email">E-Mail</label>
        <input type="email" name="email" id="email" required />
      </div>

      <div class="form-subpoint">
        <label for="message">Message</label>
        <textarea name="message" id="message" required></textarea>
      </div>
      <div class="form-submit">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>

  <!-- Feedback if Form was submitted successfully -->
  <div id="formFeedback" class="hidden">
    <h1>Thank you for your message!</h1>
    <p>I will get back to you as soon as possible.</p>
    <div id="typingGame"></div>
  </div>
</div>
{% endblock %}
